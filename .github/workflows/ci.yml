name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref (saves CI minutes on rapid pushes)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Formatting + linting ──────────────────────────────────────────────
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all --check

      # Default-feature lib (the integration test targets in tests/*.rs need
      # the websocket+test-helpers features, so --all-targets is applied only
      # to the feature-enabled invocation below — not here).
      - name: clippy (ultimo lib, default features)
        run: cargo clippy -p ultimo --lib -- -D warnings

      - name: clippy (ultimo-cli)
        run: cargo clippy -p ultimo-cli --all-targets -- -D warnings

      # --all-targets here lints lib, integration tests and benches together,
      # all of which compile once websocket+test-helpers are enabled.
      # Database features are linted in the `test-db` job (needs system libs).
      - name: clippy (websocket + test-helpers + testing + session + csrf + jwt + api-key, all targets)
        run: cargo clippy -p ultimo --all-targets --features "websocket,test-helpers,testing,session,csrf,jwt,api-key" -- -D warnings

      # Static-files + compression are pure-Rust, no system deps — lint lib only.
      # --all-targets would pull in WebSocket integration tests that need their
      # own feature; the dedicated test steps below verify the test targets.
      - name: clippy (static-files + compression, lib)
        run: cargo clippy -p ultimo --lib --features "static-files,compression" -- -D warnings

      # client-gen (ts-rs TypeScript client derivation). Lint lib only for the
      # same reason as above.
      - name: clippy (client-gen, lib)
        run: cargo clippy -p ultimo --lib --features "client-gen" -- -D warnings

  # ── Unit + integration tests (no DB system deps) ──────────────────────
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Library unit tests
        run: cargo test -p ultimo --lib

      # The integration tests in ultimo/tests/*.rs are NOT covered by `--lib`
      # and require BOTH the `websocket` and `test-helpers` features to compile.
      # This is the gap that previously let them rot silently.
      - name: Integration tests (websocket + test-helpers)
        run: cargo test -p ultimo --features "websocket,test-helpers" --tests

      - name: CLI tests
        run: cargo test -p ultimo-cli

      # Testing-utilities (the `testing` feature): in-process TestClient,
      # assertions, macros, middleware helpers, fixtures + their doctests.
      - name: Testing-utilities tests
        run: |
          cargo test -p ultimo --features "testing" --test testing_utils
          cargo test -p ultimo --features "testing" --doc

      # Cookie (core) + session feature: unit, integration, security, and doctests.
      - name: Cookie + session tests
        run: |
          cargo test -p ultimo --features "testing" --test cookie
          cargo test -p ultimo --features "testing" --test security_headers
          cargo test -p ultimo --features "testing" --test body_limit
          cargo test -p ultimo --features "testing" --test client_ip
          cargo test -p ultimo --features "csrf" --lib csrf
          cargo test -p ultimo --features "csrf,testing" --test csrf
          cargo test -p ultimo --features "session" --lib session
          cargo test -p ultimo --features "session,testing" --test session

      # Auth features: JWT (sign/verify) + API-key (pluggable store). Unit,
      # integration, and doctests — run explicitly so they don't rot silently.
      - name: Auth tests (jwt + api-key)
        run: |
          cargo test -p ultimo --features "jwt" --lib auth::jwt
          cargo test -p ultimo --features "jwt" --test jwt
          cargo test -p ultimo --features "jwt" --doc
          cargo test -p ultimo --features "api-key" --lib auth::api_key
          cargo test -p ultimo --features "api-key" --test api_key
          cargo test -p ultimo --features "api-key" --doc
          cargo test -p ultimo --features "jwt" --test authz
          cargo test -p ultimo --features "session" --doc

      # Static file serving + SPA fallback. Pure Rust, no system deps.
      # Tests in ultimo/tests/static_files.rs cover path traversal, ETag/304,
      # MIME detection, and SPA fallback routing.
      - name: Static file tests (static-files feature)
        run: cargo test -p ultimo --features "static-files" --test static_files

      # Response compression. Pure Rust (flate2/miniz_oxide + brotli crate).
      # Tests in ultimo/tests/compression.rs cover gzip, brotli, skip rules,
      # Vary header, double-compress guard, and builder min_size override.
      - name: Compression tests (compression feature)
        run: cargo test -p ultimo --features "compression" --test compression

      # TypeScript client generation (ts-rs type derivation). Covers the decl
      # collector, derived query/mutation, and the golden-file client test.
      - name: Client-gen tests (client-gen feature)
        run: |
          cargo test -p ultimo --features "client-gen" --lib client_gen_tests
          cargo test -p ultimo --features "client-gen" --test client_gen
          cargo build -p rpc-modes

      # websocket_pubsub_bench uses test_helpers::ChannelManager, so benches
      # need test-helpers in addition to websocket.
      - name: Benches compile (don't run)
        run: cargo build -p ultimo --benches --features "websocket,test-helpers"

  # ── Database-backed features (need system libraries) ──────────────────
  test-db:
    name: test (database features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      # diesel-mysql / sqlx-mysql link libmysqlclient; postgres backends need libpq.
      - name: Install DB client libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev default-libmysqlclient-dev pkg-config

      - name: Build all features
        run: cargo build -p ultimo --all-features

      - name: clippy (all features)
        run: cargo clippy -p ultimo --all-targets --all-features -- -D warnings

      # --lib: the database tests live in src/database/tests.rs (unit tests).
      # Without --lib this also compiles the websocket integration test targets,
      # which need the websocket+test-helpers features (covered by the `test` job).
      - name: Database tests (sqlite — no server required)
        run: cargo test -p ultimo --lib --features "sqlx-sqlite,diesel-sqlite"

      # Testing-utilities DB rollback helper (with_test_transaction) against sqlite.
      - name: Testing-utilities DB tests (sqlite)
        run: cargo test -p ultimo --features "testing,sqlx-sqlite" --test testing_db

  # ── Minimum Supported Rust Version ────────────────────────────────────
  # Verifies the rust-version declared in Cargo.toml (single source of truth).
  # If this fails, bump rust-version in Cargo.toml to the floor the error names.
  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          VERSION=$(grep '^rust-version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Declared MSRV: $VERSION"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (default + websocket + static-files + compression)
        run: cargo check -p ultimo -p ultimo-cli --features "websocket,static-files,compression"

  # ── Public-API breaking-change detection ──────────────────────────────
  # Guards the pre-1.0 public API against accidental SemVer breakage by
  # diffing against the version published on crates.io. Pairs with CHANGELOG.md.
  semver:
    name: semver-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install DB client libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev default-libmysqlclient-dev pkg-config
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: ultimo
          feature-group: all-features

  # ── Dependency security advisories (RUSTSEC) ──────────────────────────
  # Fails on NEW vulnerabilities. The --ignore list holds known advisories that
  # all require the sqlx 0.7 -> 0.8 upgrade (tracked separately); revisit/remove
  # these once sqlx is bumped. rsa (RUSTSEC-2023-0071) has no upstream fix and is
  # only reachable via the optional sqlx-mysql backend.
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit (committed Cargo.lock)
        run: |
          cargo audit \
            --ignore RUSTSEC-2024-0363 \
            --ignore RUSTSEC-2024-0421 \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099

  # ── Supply-chain checks (cargo-deny) ──────────────────────────────────
  # Advisories (RUSTSEC), banned/duplicate deps, and source pinning. License
  # gating is configured in deny.toml but not yet enforced here (follow-up).
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources

  # ── Version sync across Cargo.toml + both sites + changelogs ───────────
  # Cargo.toml is the single source of truth; this fails if any site or
  # changelog has drifted. Fix with `scripts/sync-versions.sh`. Especially
  # relevant on the release-plz release PR (it bumps Cargo.toml + CHANGELOG;
  # run sync-versions to update the sites before merging).
  version-sync:
    name: version-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check versions are in sync
        run: bash scripts/check-versions.sh
