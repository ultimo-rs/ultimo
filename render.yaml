    dockerfilePath: ./examples/websocket-chat/Dockerfile
    rootDir: .
    envVars:
      - key: PORT
        value: "3000"
      - key: RUST_LOG
        value: "info"

  - type: web
    name: ultimo-spa-demo
    runtime: docker
    dockerfilePath: ./examples/spa-demo/Dockerfile
    rootDir: .
    envVars:
      - key: PORT
