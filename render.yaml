services:
  - type: web
    name: ultimo-basic
    runtime: docker
    dockerfilePath: ./examples/basic/Dockerfile
    rootDir: .
    envVars:
      - key: PORT
        value: "3000"
      - key: RUST_LOG
        value: "info"

  - type: web
    name: ultimo-session-auth
    runtime: docker
    dockerfilePath: ./examples/session-auth/Dockerfile
    rootDir: .
    envVars:
      - key: PORT
        value: "3000"
      - key: RUST_LOG
        value: "info"

  - type: web
    name: ultimo-jwt-auth
    runtime: docker
    dockerfilePath: ./examples/jwt-auth/Dockerfile
